<!DOCTYPE html>
<html lang="en">
<head>
<script>
 // Only redirect to loading page if we haven't just come from it
 if (sessionStorage.getItem('hasSeenLoading') !== 'true') {
     localStorage.setItem("loadingTarget", "forgot-password.html");
     window.location.href = "loading_page.html";
 }
</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | Hanuman Sports</title>
    <meta name="theme-color" content="#00F0FF">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="logo.png" sizes="192x192">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #00F0FF;
            --primary-light: rgba(0, 240, 255, 0.12);
            --secondary: #0A0E17;
            --accent: #00F0FF;
            --light: #F8F9FA;
            --dark: #212529;
            --white: #FFFFFF;
            --gray: #6C757D;
            --glass: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --neon-shadow: 0 0 12px rgba(0, 240, 255, 0.8);
            --primary-shadow: 0 0 18px rgba(0, 240, 255, 0.6);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--secondary);
            color: var(--light);
            line-height: 1.6;
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(rgba(10, 14, 23, 0.9), rgba(10, 14, 23, 0.9)),
                url('https://images.unsplash.com/photo-1540747913346-19e32dc3e97e?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 1px;
        }

        .forgot-container {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 3rem;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            position: relative;
            overflow: hidden;
            margin: 2rem;
        }

        .forgot-container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(0, 240, 255, 0.1) 0%, transparent 70%);
            z-index: -1;
        }

        .logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo img {
            height: 80px;
            filter: drop-shadow(0 0 5px var(--primary));
        }

        .logo h1 {
            font-size: 2rem;
            color: var(--white);
            background: linear-gradient(to right, #ffffff, var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo p {
            font-size: 0.9rem;
            color: var(--gray);
        }

        .instructions {
            text-align: center;
            color: var(--gray);
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--accent);
            font-weight: 500;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper input {
            width: 100%;
            padding: 1rem 2.5rem 1rem 1rem;
            border-radius: 8px;
            border: 1px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.1);
            color: var(--white);
            font-size: 1rem;
            transition: all 0.3s;
        }

        .input-wrapper input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.3);
        }

        .input-wrapper i {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gray);
        }

        .btn {
            width: 100%;
            padding: 1rem;
            border-radius: 30px;
            border: 1px solid var(--primary);
            background: rgba(0, 240, 255, 0.15);
            color: var(--primary);
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(6px);
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.3);
        }

        .btn:hover {
            background: var(--primary);
            color: #000;
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.8);
            transform: translateY(-3px);
        }

        .login-link {
            text-align: center;
            margin-top: 2rem;
            color: var(--gray);
        }

        .login-link a {
            color: var(--accent);
            text-decoration: none;
        }

        .login-link a:hover {
            color: var(--primary);
        }

        .success-message {
            display: none;
            text-align: center;
            padding: 1rem;
            background: rgba(0, 200, 100, 0.1);
            border: 1px solid rgba(0, 200, 100, 0.3);
            border-radius: 8px;
            margin-bottom: 1.5rem;
            color: #00c864;
        }

        .success-message i {
            margin-right: 8px;
        }

        @media (max-width: 576px) {
            .forgot-container { padding: 2rem 1.5rem; }
            .logo img { height: 60px; }
            .logo h1 { font-size: 1.5rem; }
        }
    </style>
</head>

<body>
    <div class="forgot-container">
        <div class="logo">
            <img src="logo.png" alt="Hanuman Sports Logo">
            <h1>Hanuman Sports</h1>
            <p>Mysore's Premier Sports Destination</p>
        </div>

        <div class="step-indicator">
            <div class="step-dot active" id="step1-dot"></div>
            <div class="step-dot" id="step2-dot"></div>
        </div>

        <div class="instructions" id="step-instructions">
            Enter your email and we'll send a 6-digit reset code.
        </div>

        <div class="success-message" id="success-message">
            <i class="fas fa-check-circle"></i>
            <span id="success-text">Password has been reset successfully!</span>
        </div>

        <!-- Step 1 -->
        <form id="step1-form">
            <div class="form-group">
                <label for="email">Email Address</label>
                <div class="input-wrapper">
                    <input type="email" id="email" required placeholder="Enter your registered email">
                    <i class="fas fa-envelope"></i>
                </div>
            </div>
            <button type="submit" class="btn" id="send-code-btn">Send Reset Code</button>
            <div class="login-link">
                Remember your password? <a href="login.html">Back to Login</a>
            </div>
        </form>

        <!-- Step 2 -->
        <div class="step-2" id="step2">
            <div class="form-group">
                <label for="reset-code">Reset Code</label>
                <div class="input-wrapper">
                    <input type="text" id="reset-code" maxlength="6" placeholder="Enter 6-digit code" style="letter-spacing:4px;font-weight:700;">
                    <i class="fas fa-key"></i>
                </div>
            </div>
            <div class="form-group">
                <label for="new-password">New Password</label>
                <div class="input-wrapper">
                    <input type="password" id="new-password" required placeholder="Enter new password" minlength="6">
                    <i class="fas fa-lock"></i>
                </div>
            </div>
            <div class="form-group">
                <label for="confirm-password">Confirm Password</label>
                <div class="input-wrapper">
                    <input type="password" id="confirm-password" required placeholder="Confirm new password">
                    <i class="fas fa-lock"></i>
                </div>
            </div>
            <button class="btn" id="reset-btn">Reset Password</button>
            <div class="resend-link">
                Didn't get the code? <a id="resend-link" style="cursor:pointer;color:var(--primary);">Resend Code</a>
            </div>
        </div>
    </div>

    <style>
        .step-indicator { display:flex; justify-content:center; gap:0.5rem; margin-bottom:1.5rem; }
        .step-dot { width:10px; height:10px; border-radius:50%; background:var(--glass-border); transition:all 0.3s; }
        .step-dot.active { background:var(--primary); box-shadow:0 0 8px rgba(0,240,255,0.6); }
        .step-dot.done { background:#4CAF50; }
        .step-2 { display:none; }
        .resend-link { text-align:center; margin-top:0.8rem; font-size:0.8rem; color:var(--gray); }
        .btn:disabled { opacity:0.5; cursor:not-allowed; }
    </style>

    <script>
    const API_BASE = window.API_BASE_URL;
    let currentEmail = '';

    // Step 1: Send code
    document.getElementById('step1-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        const email = document.getElementById('email').value;
        currentEmail = email;
        const btn = document.getElementById('send-code-btn');
        btn.disabled = true;
        btn.textContent = 'Sending...';
        try {
            const res = await fetch(`${API_BASE}/auth/forgot-password`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email })
            });
            const data = await res.json();
            if (data.success) {
                document.getElementById('step1-form').style.display = 'none';
                document.getElementById('step2').style.display = 'block';
                document.getElementById('step-instructions').textContent = 'Enter the 6-digit code sent to your email.';
                document.getElementById('step1-dot').className = 'step-dot done';
                document.getElementById('step2-dot').className = 'step-dot active';
                document.getElementById('success-message').style.display = 'block';
                document.getElementById('success-text').textContent = '✓ Code sent! Check your email for the reset code.';
                document.getElementById('success-message').style.background = 'rgba(0,240,255,0.1)';
                document.getElementById('success-message').style.borderColor = 'var(--primary)';
                document.getElementById('success-message').style.color = 'var(--primary)';
            } else {
                alert(data.msg || 'Failed to send code');
            }
        } catch(e) {
            alert('Network error. Check that the backend server is running.');
        }
        btn.disabled = false;
        btn.textContent = 'Send Reset Code';
    });

    // Step 2: Reset password
    document.getElementById('reset-btn').addEventListener('click', async function() {
        const code = document.getElementById('reset-code').value.trim();
        const newPassword = document.getElementById('new-password').value;
        const confirm = document.getElementById('confirm-password').value;
        if (newPassword !== confirm) { alert('Passwords do not match'); return; }
        if (newPassword.length < 6) { alert('Password must be at least 6 characters'); return; }
        const btn = this;
        btn.disabled = true;
        btn.textContent = 'Resetting...';
        try {
            const res = await fetch(`${API_BASE}/auth/reset-password`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: currentEmail, code, newPassword })
            });
            const data = await res.json();
            if (data.success) {
                document.getElementById('step2').style.display = 'none';
                document.getElementById('step-instructions').textContent = '';
                document.getElementById('success-message').style.display = 'block';
                document.getElementById('success-text').textContent = '✓ Password reset successfully! Redirecting to login...';
                document.getElementById('success-message').style.background = 'rgba(76,175,80,0.1)';
                document.getElementById('success-message').style.borderColor = '#4CAF50';
                document.getElementById('success-message').style.color = '#4CAF50';
                setTimeout(() => window.location.href = 'login.html', 2000);
            } else {
                alert(data.msg || 'Reset failed');
            }
        } catch(e) {
            alert('Network error');
        }
        btn.disabled = false;
        btn.textContent = 'Reset Password';
    });

    // Resend code
    document.getElementById('resend-link').addEventListener('click', async function() {
        if (!currentEmail) return;
        this.textContent = 'Resending...';
        this.style.pointerEvents = 'none';
        try {
            await fetch(`${API_BASE}/auth/forgot-password`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: currentEmail })
            });
            document.getElementById('success-text').textContent = '✓ New code sent! Check your email for the reset code.';
        } catch(e) {}
        this.textContent = 'Resend Code';
        setTimeout(() => { this.style.pointerEvents = 'auto'; }, 5000);
    });
    </script>
<script src="hs-utils.js"></script>
</body>
</html>
