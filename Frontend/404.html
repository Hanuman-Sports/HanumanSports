<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Hanuman Sports</title>
    <meta name="theme-color" content="#00F0FF">
    <link rel="icon" href="logo.png" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00F0FF;
            --secondary: #0A0E17;
            --light: #F8F9FA;
            --white: #FFFFFF;
            --gray: #6C757D;
            --neon-shadow: 0 0 12px rgba(0, 240, 255, 0.8);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body {
            background: var(--secondary);
            color: var(--light);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }
        .logo { margin-bottom: 2rem; }
        .logo img { height: 80px; filter: drop-shadow(0 0 5px var(--primary)); }
        .error-code {
            font-family: 'Orbitron', sans-serif;
            font-size: 8rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), #fff);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: var(--neon-shadow);
            line-height: 1;
        }
        h1 { font-size: 1.5rem; margin: 1rem 0 0.5rem; color: var(--white); }
        p { color: var(--gray); max-width: 400px; margin-bottom: 2rem; font-size: 0.95rem; }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 12px 30px;
            background: var(--primary);
            color: #000;
            text-decoration: none;
            font-weight: 600;
            border-radius: 8px;
            transition: all 0.3s;
        }
        .btn:hover { box-shadow: var(--neon-shadow); transform: translateY(-2px); }
        .links { margin-top: 2rem; display: flex; gap: 1.5rem; flex-wrap: wrap; justify-content: center; }
        .links a { color: var(--gray); text-decoration: none; font-size: 0.85rem; transition: color 0.3s; }
        .links a:hover { color: var(--primary); }
        @media (max-width: 480px) {
            .error-code { font-size: 5rem; }
            h1 { font-size: 1.2rem; }
        }
    </style>
</head>
<body>
    <div class="logo"><img src="logo.png" alt="Hanuman Sports"></div>
    <div class="error-code">404</div>
    <h1>Page Not Found</h1>
    <p>The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
    <a href="index.html" class="btn"><i class="fas fa-home"></i> Back to Home</a>
    <div class="links">
        <a href="category.html">Shop Categories</a>
        <a href="profile.html">My Account</a>
        <a href="order.html">Order Tracking</a>
    </div>
</body>
</html>
