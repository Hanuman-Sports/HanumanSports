<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hanuman Sports</title>
    <meta name="theme-color" content="#00F0FF">
    <link rel="icon" href="logo.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script>
 // Only redirect to loading page if we haven't just come from it
 if (sessionStorage.getItem('hasSeenLoading') !== 'true') {
     localStorage.setItem("loadingTarget", "chat_bot.html");
     window.location.href = "loading_page.html";
 }
</script>


</head>
    <style>
        :root {
            --primary: #00F0FF;
            --secondary: #0A0E17;
            --accent: #00F0FF;
            --light: #F8F9FA;
            --white: #FFFFFF;
            --gray: #6C757D;
            --glass: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --neon-shadow: 0 0 12px rgba(0, 240, 255, 0.8);
            --success: #4CAF50;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: #0A0E17; color: #F8F9FA; }
        h1, h2, h3, h4, h5, h6 { font-family: 'Orbitron', sans-serif; }
        a { text-decoration: none; color: inherit; }
        
        .floating-elements { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; overflow: hidden; }
        .floating-element { position: absolute; border-radius: 50%; background: rgba(0, 240, 255, 0.05); filter: blur(40px); animation: float 15s infinite linear; }
        @keyframes float { 0% { transform: translate(0, 0) rotate(0deg); } 50% { transform: translate(10vw, 10vh) rotate(180deg); } 100% { transform: translate(0, 0) rotate(360deg); } }


<body>
    <!-- Floating Background Elements -->
    <div class="floating-elements">
        <div class="floating-element" style="width: 300px; height: 300px; top: 10%; left: 5%;"></div>
        <div class="floating-element" style="width: 400px; height: 400px; bottom: 15%; right: 10%; animation-delay: 3s;"></div>
        <div class="floating-element" style="width: 250px; height: 250px; top: 50%; left: 30%; animation-delay: 5s;"></div>
    </div>

    <!-- Header -->
    <header class="chat-header">
        <div class="header-container">
            <div class="logo">
                <img src="logo.png" alt="Hanuman Sports Logo">
                <div class="logo-text">
                    <h1>HANUMAN AI</h1>
                    <p>Your Sports Assistant</p>
                </div>
            </div>
            <div class="header-actions">
                <a href="index.html" class="header-btn">
                    <i class="fas fa-home"></i>
                    <span>Home</span>
                </a>
                <a href="category.html" class="header-btn">
                    <i class="fas fa-store"></i>
                    <span>Shop</span>
                </a>
                <a href="#" class="header-btn" id="clear-chat-btn">
                    <i class="fas fa-trash-alt"></i>
                    <span>Clear Chat</span>
                </a>
            </div>
        </div>
    </header>

    <!-- Main Chat Container -->
    <div class="chat-container">
        <!-- Sidebar -->
        <aside class="chat-sidebar">
            <div class="sidebar-section">
                <h3><i class="fas fa-bolt"></i> QUICK TOPICS</h3>
                <div class="quick-topics">
                    <div class="topic-chip" data-query="What cricket equipment do you have?">
                        <i class="fas fa-baseball-ball"></i>
                        <span>Cricket Equipment</span>
                    </div>
                    <div class="topic-chip" data-query="Show me badminton rackets">
                        <i class="fas fa-table-tennis"></i>
                        <span>Badminton Rackets</span>
                    </div>
                    <div class="topic-chip" data-query="What footballs are available?">
                        <i class="fas fa-futbol"></i>
                        <span>Football</span>
                    </div>
                    <div class="topic-chip" data-query="Where is your store located?">
                        <i class="fas fa-map-marker-alt"></i>
                        <span>Store Location</span>
                    </div>
                    <div class="topic-chip" data-query="What are your store timings?">
                        <i class="fas fa-clock"></i>
                        <span>Store Timings</span>
                    </div>
                    <div class="topic-chip" data-query="Do you offer discounts?">
                        <i class="fas fa-tag"></i>
                        <span>Offers & Discounts</span>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Chat Main Area -->
        <main class="chat-main">
            <!-- Agent Info -->
            <div class="chat-agent">
                <div class="agent-avatar">
                    <img src="logo.png" alt="Hanuman AI">
                </div>
                <div class="agent-info">
                    <h2>HANUMAN AI ASSISTANT</h2>
                    <div class="agent-status">
                        <span class="status-dot"></span>
                        <span>Online • Sports Expert</span>
                    </div>
                </div>
            </div>

            <!-- Messages Area -->
            <div class="messages-area" id="messagesArea">
                <!-- Messages will be added here dynamically -->
            </div>

                <!-- Input Wrapper -->
                <div class="input-wrapper">
                    <textarea 
                        class="message-input" 
                        id="messageInput" 
                        placeholder="Ask me about sports equipment, prices, recommendations..."
                        rows="1"
                        onkeydown="handleKeyDown(event)"
                        oninput="autoResize(this)"
                    ></textarea>
                    <div class="input-actions">
                        <button class="input-action-btn" id="attachBtn" title="Attach image">
                            <i class="fas fa-image"></i>
                        </button>
                        <button class="input-action-btn send-btn" id="sendBtn" onclick="sendMessage()">
                            <i class="fas fa-paper-plane"></i>
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Back to Home Button -->
    <a href="index.html" class="back-home" title="Back to Home">
        <i class="fas fa-arrow-left"></i>
    </a>

    <!-- Welcome Overlay -->
    <div class="welcome-overlay" id="welcomeOverlay">
        <div class="welcome-card">
            <img src="logo.png" alt="Hanuman AI">
            <h2>Jai Hanuman!</h2>
            <p>Welcome to Hanuman Sports AI Assistant! I'm here to help you find the perfect sports equipment, answer questions about pricing, provide recommendations, and guide you to our store in Mysore. How can I assist you today?</p>
            <button class="welcome-btn" onclick="startChat()">Start Chatting</button>
        </div>
    </div>

    <script>
        // Chat State
        let isLoading = false;
        let conversationHistory = [];
        let isWelcomeDismissed = false;

        const SYSTEM_PROMPT = `You are Hanuman AI, the friendly and knowledgeable sports assistant for Hanuman Sports — a premium sports equipment store based in Mysore, India. You help customers with:

- Product recommendations for cricket, badminton, football, volleyball, tennis, and other sports
- Pricing guidance (typical ranges in INR)
- Equipment selection based on skill level (beginner, intermediate, professional)
- Store information: located in Mysore, Karnataka, India at 8JR8+72 Mysuru
- Contact: +91 9538452672, info@hanumansports.com
- Store hours: Monday-Saturday 9:00 AM - 8:00 PM, Sunday 10:00 AM - 6:00 PM
- Brand suggestions: SG, SS, GM, Kookaburra for cricket; Yonex, Victor, Li-Ning for badminton; Nike, Adidas, Cosco for football; Nivia for volleyball
- Sports tips and which gear suits different players

Always be enthusiastic, concise, and helpful. Use emojis occasionally to keep it lively. Respond in 2-4 sentences unless more detail is needed. Always end with an offer to help further or suggest a related product. You represent Hanuman Sports proudly.`;

        // DOM Elements
        const messagesArea = document.getElementById('messagesArea');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const welcomeOverlay = document.getElementById('welcomeOverlay');
        const clearChatBtn = document.getElementById('clear-chat-btn');

        // Get current time
        function getCurrentTime() {
            return new Date().toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
        }

        // Add message to chat
        function addMessage(text, sender) {
            const time = getCurrentTime();
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;
            
            let formattedText = text;
            if (sender === 'bot') {
                formattedText = text
                    .replace(/\*\*(.*?)\*\*/g, '<strong style="color:#00F0FF">$1</strong>')
                    .replace(/\n/g, '<br>');
            }

            messageDiv.innerHTML = `
                <div class="message-avatar">
                    <i class="fas fa-${sender === 'bot' ? 'robot' : 'user'}"></i>
                </div>
                <div>
                    <div class="message-bubble">${formattedText}</div>
                    <div class="message-time">${time}</div>
                </div>
            `;

            messagesArea.appendChild(messageDiv);
            scrollToBottom();
        }

        // Show typing indicator
        function showTyping() {
            const typingDiv = document.createElement('div');
            typingDiv.className = 'typing-indicator';
            typingDiv.id = 'typingIndicator';
            typingDiv.innerHTML = `
                <div class="message-avatar">
                    <i class="fas fa-robot"></i>
                </div>
                <div class="typing-dots">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            `;
            messagesArea.appendChild(typingDiv);
            scrollToBottom();
        }

        // Hide typing indicator
        function hideTyping() {
            const typing = document.getElementById('typingIndicator');
            if (typing) typing.remove();
        }

        // Scroll to bottom
        function scrollToBottom() {
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }

        // Auto resize textarea
        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = Math.min(textarea.scrollHeight, 100) + 'px';
        }

        // Handle Enter key
        function handleKeyDown(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        // Send message
        async function sendMessage() {
            const text = messageInput.value.trim();
            if (!text || isLoading) return;

            // Dismiss welcome if still showing
            if (welcomeOverlay && welcomeOverlay.style.display !== 'none') {
                welcomeOverlay.style.display = 'none';
            }

            // Add user message
            addMessage(text, 'user');
            messageInput.value = '';
            messageInput.style.height = 'auto';

            conversationHistory.push({ role: 'user', content: text });

            isLoading = true;
            sendBtn.disabled = true;
            showTyping();

            try {
                // Simulate AI response (replace with actual API call)
                await simulateAIResponse(text);
            } catch (error) {
                hideTyping();
                addMessage("Sorry, I'm having trouble connecting. Please try again or visit our store in Mysore! 🏪", 'bot');
            }

            isLoading = false;
            sendBtn.disabled = false;
            messageInput.focus();
        }

        // Simulate AI responses (replace with actual API)
        async function simulateAIResponse(query) {
            await new Promise(resolve => setTimeout(resolve, 1500));

            let response = "";

            if (query.toLowerCase().includes('cricket')) {
                response = "🏏 For cricket, we have premium equipment from **SG**, **SS**, **GM**, and **Kookaburra**. We stock everything from Kashmir Willow bats for beginners (₹1500-3000) to English Willow for pros (₹5000-15000). Would you like specific recommendations based on your batting style?";
            } else if (query.toLowerCase().includes('badminton')) {
                response = "🏸 Our badminton section features **Yonex**, **Victor**, and **Li-Ning** rackets. For beginners, we recommend the Yonex Nanoray series (₹2000-4000). Intermediate players love the Astrox series (₹5000-8000). Would you like to know about shuttlecocks or strings too?";
            } else if (query.toLowerCase().includes('football')) {
                response = "⚽ We have footballs from **Nike**, **Adidas**, **Cosco**, and **Nivia**. Size 3 for kids (₹500-1000), Size 4 for youth (₹800-1500), Size 5 for adults (₹1500-4000). The Adidas Tango and Nike Premier League balls are our top sellers! Interested in any specific brand?";
            } else if (query.toLowerCase().includes('location') || query.toLowerCase().includes('store')) {
                response = "📍 We're located at **8JR8+72 Mysuru, Karnataka**. Open Monday-Saturday 9AM-8PM, Sunday 10AM-6PM. You can call us at **+91 9538452672** for directions. Would you like the Google Maps link?";
            } else if (query.toLowerCase().includes('price') || query.toLowerCase().includes('cost')) {
                response = "💰 Our prices range from budget-friendly to professional grade. Basic equipment starts from ₹500, mid-range from ₹2000-5000, and professional gear from ₹8000 upwards. We also have frequent discounts! What's your budget and sport of interest?";
            } else if (query.toLowerCase().includes('beginner')) {
                response = "🌟 For beginners, we recommend starting with quality mid-range equipment that offers good value. For cricket, the SG Club bats (₹2500-3500) are perfect. For badminton, Yonex Nanoray Light (₹3000) is great. Would you like personalized advice for any sport?";
            } else {
                response = "Thanks for reaching out to Hanuman Sports! 🙏 We're Mysore's premier sports destination with 25+ years of experience. Could you please specify which sport or equipment you're interested in? I'd love to help you find the perfect gear!";
            }

            hideTyping();
            addMessage(response, 'bot');
            conversationHistory.push({ role: 'assistant', content: response });
        }

        // Start chat (dismiss welcome)
        function startChat() {
            welcomeOverlay.style.display = 'none';
            addMessage("Jai Hanuman! 🙏 Welcome to Hanuman Sports AI Assistant! I'm here to help you with sports equipment recommendations, pricing, store information, and more. What sport are you interested in today?", 'bot');
        }

        // Clear chat
        function clearChat() {
            messagesArea.innerHTML = '';
            conversationHistory = [];
            addMessage("Chat cleared. How can I help you today?", 'bot');
        }

        // Initialize event listeners
        document.addEventListener('DOMContentLoaded', () => {
            // Quick topics
            document.querySelectorAll('.topic-chip, .sports-list li, .suggestion-chip').forEach(element => {
                element.addEventListener('click', () => {
                    const query = element.getAttribute('data-query') || element.textContent.trim();
                    messageInput.value = query;
                    sendMessage();
                });
            });

            // Clear chat button
            if (clearChatBtn) {
                clearChatBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    if (confirm('Are you sure you want to clear the chat?')) {
                        clearChat();
                    }
                });
            }

            // Attach button (placeholder)
            document.getElementById('attachBtn')?.addEventListener('click', () => {
                alert('Image upload feature coming soon! You can still describe the product you\'re looking for.');
            });
        });

        // Auto-resize on input
        window.autoResize = autoResize;
        window.handleKeyDown = handleKeyDown;
        window.sendMessage = sendMessage;
        window.startChat = startChat;

        // Hide welcome overlay after 5 seconds automatically
        setTimeout(() => {
            if (welcomeOverlay && !isWelcomeDismissed) {
                welcomeOverlay.style.opacity = '0';
                setTimeout(() => {
                    welcomeOverlay.style.display = 'none';
                }, 500);
            }
        }, 5000);
    </script>

    @media (max-width: 480px) {

    }
    @media (max-width: 380px) {

    }
    @media print {
        .top-bar, .mobile-menu-btn, .cart-sidebar, .search-modal, .overlay, .back-to-top, .floating-elements { display: none !important; }

        .product-card { break-inside: avoid; }
    }

</style>
</body>
</html>
