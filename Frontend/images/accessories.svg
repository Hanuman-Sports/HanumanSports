<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0E17"/>
      <stop offset="100%" stop-color="#141829"/>
    </linearGradient>
    <linearGradient id="orangeGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff8533"/>
      <stop offset="100%" stop-color="#e63900"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff8533" stop-opacity="0.15"/>
      <stop offset="70%" stop-color="#ff8533" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#ff8533" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  <circle cx="200" cy="140" r="120" fill="url(#halo)"/>
  <!-- Dumbbell -->
  <g filter="url(#glow)">
    <!-- Left weight plates -->
    <rect x="75" y="115" width="40" height="45" rx="8" fill="none" stroke="url(#orangeGlow)" stroke-width="3"/>
    <rect x="80" y="108" width="30" height="59" rx="5" fill="none" stroke="#ff8533" stroke-width="2" opacity="0.4"/>
    <line x1="82" y1="120" x2="108" y2="120" stroke="#ff8533" stroke-width="1" opacity="0.3"/>
    <line x1="82" y1="130" x2="108" y2="130" stroke="#ff8533" stroke-width="1" opacity="0.3"/>
    <line x1="82" y1="140" x2="108" y2="140" stroke="#ff8533" stroke-width="1" opacity="0.3"/>
    <line x1="82" y1="150" x2="108" y2="150" stroke="#ff8533" stroke-width="1" opacity="0.3"/>
    <!-- Bar -->
    <line x1="115" y1="137" x2="265" y2="137" stroke="url(#orangeGlow)" stroke-width="6" stroke-linecap="round"/>
    <!-- Right weight plates -->
    <rect x="285" y="115" width="40" height="45" rx="8" fill="none" stroke="url(#orangeGlow)" stroke-width="3"/>
    <rect x="290" y="108" width="30" height="59" rx="5" fill="none" stroke="#ff8533" stroke-width="2" opacity="0.4"/>
    <line x1="292" y1="120" x2="318" y2="120" stroke="#ff8533" stroke-width="1" opacity="0.3"/>
    <line x1="292" y1="130" x2="318" y2="130" stroke="#ff8533" stroke-width="1" opacity="0.3"/>
    <line x1="292" y1="140" x2="318" y2="140" stroke="#ff8533" stroke-width="1" opacity="0.3"/>
    <line x1="292" y1="150" x2="318" y2="150" stroke="#ff8533" stroke-width="1" opacity="0.3"/>
  </g>
  <!-- Water bottle -->
  <g filter="url(#softGlow)">
    <rect x="175" y="70" width="28" height="45" rx="6" fill="none" stroke="#ff8533" stroke-width="2.5"/>
    <rect x="178" y="63" width="22" height="12" rx="4" fill="none" stroke="#ff8533" stroke-width="2"/>
    <line x1="189" y1="63" x2="189" y2="52" stroke="#ff8533" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Water level -->
    <path d="M178 95 Q189 108 200 95" fill="none" stroke="#ff8533" stroke-width="2" opacity="0.5"/>
    <path d="M180 100 Q189 110 198 100" fill="none" stroke="#ff8533" stroke-width="1" opacity="0.3"/>
  </g>
  <!-- Knee brace -->
  <g filter="url(#softGlow)">
    <rect x="140" y="195" width="40" height="60" rx="10" fill="none" stroke="#ff8533" stroke-width="2.5"/>
    <line x1="145" y1="205" x2="175" y2="205" stroke="#ff8533" stroke-width="1.5" opacity="0.5"/>
    <line x1="145" y1="215" x2="175" y2="215" stroke="#ff8533" stroke-width="1.5" opacity="0.5"/>
    <line x1="145" y1="225" x2="175" y2="225" stroke="#ff8533" stroke-width="1.5" opacity="0.5"/>
    <line x1="145" y1="235" x2="175" y2="235" stroke="#ff8533" stroke-width="1.5" opacity="0.5"/>
    <line x1="145" y1="245" x2="175" y2="245" stroke="#ff8533" stroke-width="1.5" opacity="0.5"/>
  </g>
  <!-- Wrist band -->
  <g filter="url(#softGlow)">
    <ellipse cx="310" cy="195" rx="16" ry="25" fill="none" stroke="#ff8533" stroke-width="2.5"/>
    <line x1="298" y1="183" x2="322" y2="183" stroke="#ff8533" stroke-width="1.5" opacity="0.4"/>
    <line x1="298" y1="195" x2="322" y2="195" stroke="#ff8533" stroke-width="1.5" opacity="0.4"/>
    <line x1="298" y1="207" x2="322" y2="207" stroke="#ff8533" stroke-width="1.5" opacity="0.4"/>
  </g>
  <!-- Particles -->
  <circle cx="90" cy="55" r="3" fill="#ff8533" opacity="0.7" filter="url(#softGlow)"/>
  <circle cx="345" cy="100" r="2.5" fill="#ff8533" opacity="0.5" filter="url(#softGlow)"/>
  <circle cx="120" cy="270" r="2" fill="#ff8533" opacity="0.4"/>
  <circle cx="330" cy="270" r="1.5" fill="#ff8533" opacity="0.3"/>
</svg>