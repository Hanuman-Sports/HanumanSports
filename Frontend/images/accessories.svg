<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0E17"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  <!-- Dumbbell left side weights -->
  <rect x="95" y="115" width="35" height="40" rx="6" fill="none" stroke="#ff6b35" stroke-width="3"/>
  <rect x="100" y="108" width="25" height="54" rx="4" fill="none" stroke="#ff6b35" stroke-width="2" opacity="0.5"/>
  <!-- Dumbbell bar -->
  <line x1="130" y1="135" x2="270" y2="135" stroke="#ff6b35" stroke-width="5" stroke-linecap="round"/>
  <!-- Dumbbell right side weights -->
  <rect x="270" y="115" width="35" height="40" rx="6" fill="none" stroke="#ff6b35" stroke-width="3"/>
  <rect x="275" y="108" width="25" height="54" rx="4" fill="none" stroke="#ff6b35" stroke-width="2" opacity="0.5"/>
  <!-- Water bottle -->
  <rect x="155" y="70" width="24" height="40" rx="4" fill="none" stroke="#ff6b35" stroke-width="2.5"/>
  <rect x="158" y="65" width="18" height="10" rx="3" fill="none" stroke="#ff6b35" stroke-width="2"/>
  <line x1="167" y1="65" x2="167" y2="55" stroke="#ff6b35" stroke-width="2" stroke-linecap="round"/>
  <path d="M160 95 Q167 105 174 95" fill="none" stroke="#ff6b35" stroke-width="1.5" opacity="0.5"/>
  <!-- Knee brace / support -->
  <rect x="155" y="175" width="35" height="55" rx="8" fill="none" stroke="#ff6b35" stroke-width="2.5"/>
  <line x1="160" y1="185" x2="185" y2="185" stroke="#ff6b35" stroke-width="1.5" opacity="0.4"/>
  <line x1="160" y1="195" x2="185" y2="195" stroke="#ff6b35" stroke-width="1.5" opacity="0.4"/>
  <line x1="160" y1="205" x2="185" y2="205" stroke="#ff6b35" stroke-width="1.5" opacity="0.4"/>
  <line x1="160" y1="215" x2="185" y2="215" stroke="#ff6b35" stroke-width="1.5" opacity="0.4"/>
  <!-- Wrist band -->
  <ellipse cx="310" cy="175" rx="15" ry="22" fill="none" stroke="#ff6b35" stroke-width="2.5"/>
  <line x1="300" y1="165" x2="320" y2="165" stroke="#ff6b35" stroke-width="1.5" opacity="0.4"/>
  <line x1="300" y1="175" x2="320" y2="175" stroke="#ff6b35" stroke-width="1.5" opacity="0.4"/>
  <line x1="300" y1="185" x2="320" y2="185" stroke="#ff6b35" stroke-width="1.5" opacity="0.4"/>
  <!-- Accent dots -->
  <circle cx="100" cy="70" r="4" fill="#ff6b35" opacity="0.6"/>
  <circle cx="320" cy="80" r="3" fill="#ff6b35" opacity="0.4"/>
  <circle cx="340" cy="250" r="2" fill="#ff6b35" opacity="0.3"/>
</svg>