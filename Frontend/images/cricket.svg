<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0E17"/>
      <stop offset="100%" stop-color="#141829"/>
    </linearGradient>
    <linearGradient id="greenGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e86b"/>
      <stop offset="100%" stop-color="#009944"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00e86b" stop-opacity="0.15"/>
      <stop offset="70%" stop-color="#00e86b" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#00e86b" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  <circle cx="200" cy="140" r="120" fill="url(#halo)"/>
  <!-- Cricket bat -->
  <g filter="url(#glow)">
    <rect x="130" y="65" width="30" height="145" rx="6" fill="none" stroke="url(#greenGlow)" stroke-width="3" stroke-linecap="round"/>
    <rect x="130" y="85" width="30" height="85" rx="3" fill="#00e86b" opacity="0.08"/>
  </g>
  <!-- Bat grain lines -->
  <g opacity="0.4">
    <line x1="138" y1="90" x2="152" y2="90" stroke="#00e86b" stroke-width="0.8"/>
    <line x1="138" y1="100" x2="152" y2="100" stroke="#00e86b" stroke-width="0.8"/>
    <line x1="138" y1="110" x2="152" y2="110" stroke="#00e86b" stroke-width="0.8"/>
    <line x1="138" y1="120" x2="152" y2="120" stroke="#00e86b" stroke-width="0.8"/>
    <line x1="138" y1="130" x2="152" y2="130" stroke="#00e86b" stroke-width="0.8"/>
    <line x1="138" y1="140" x2="152" y2="140" stroke="#00e86b" stroke-width="0.8"/>
    <line x1="138" y1="150" x2="152" y2="150" stroke="#00e86b" stroke-width="0.8"/>
    <line x1="138" y1="160" x2="152" y2="160" stroke="#00e86b" stroke-width="0.8"/>
  </g>
  <!-- Bat handle -->
  <rect x="133" y="38" width="24" height="30" rx="5" fill="none" stroke="#00e86b" stroke-width="2.5"/>
  <line x1="137" y1="44" x2="153" y2="44" stroke="#00e86b" stroke-width="1.5" opacity="0.5"/>
  <line x1="137" y1="50" x2="153" y2="50" stroke="#00e86b" stroke-width="1.5" opacity="0.5"/>
  <line x1="137" y1="56" x2="153" y2="56" stroke="#00e86b" stroke-width="1.5" opacity="0.5"/>
  <line x1="137" y1="62" x2="153" y2="62" stroke="#00e86b" stroke-width="1.5" opacity="0.5"/>
  <!-- Cricket stumps -->
  <g filter="url(#glow)">
    <line x1="260" y1="75" x2="260" y2="215" stroke="url(#greenGlow)" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="282" y1="75" x2="282" y2="215" stroke="url(#greenGlow)" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="304" y1="75" x2="304" y2="215" stroke="url(#greenGlow)" stroke-width="3.5" stroke-linecap="round"/>
  </g>
  <!-- Stump details (wood grain) -->
  <g opacity="0.3">
    <line x1="275" y1="85" x2="275" y2="210" stroke="#00e86b" stroke-width="0.5" stroke-dasharray="8,4"/>
    <line x1="297" y1="85" x2="297" y2="210" stroke="#00e86b" stroke-width="0.5" stroke-dasharray="8,4"/>
  </g>
  <!-- Bails -->
  <line x1="255" y1="70" x2="309" y2="70" stroke="url(#greenGlow)" stroke-width="3.5" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="258" y1="66" x2="306" y2="66" stroke="#00e86b" stroke-width="1" opacity="0.4"/>
  <!-- Cricket ball -->
  <g filter="url(#glow)">
    <circle cx="320" cy="190" r="20" fill="none" stroke="url(#greenGlow)" stroke-width="2.5"/>
    <circle cx="320" cy="190" r="18" fill="none" stroke="#00e86b" stroke-width="0.5" opacity="0.4"/>
  </g>
  <!-- Ball seam -->
  <g opacity="0.6">
    <path d="M308 180 Q320 192 308 204" fill="none" stroke="#00e86b" stroke-width="1.5"/>
    <path d="M332 180 Q320 192 332 204" fill="none" stroke="#00e86b" stroke-width="1.5"/>
    <line x1="306" y1="190" x2="334" y2="190" stroke="#00e86b" stroke-width="1" opacity="0.4"/>
  </g>
  <!-- Impact stars -->
  <path d="M110 160 l4-8 l4 8 l-8-4 l8-4" fill="none" stroke="#00e86b" stroke-width="1" opacity="0.5" filter="url(#softGlow)"/>
  <path d="M90 100 l3-6 l3 6 l-6-3 l6-3" fill="none" stroke="#00e86b" stroke-width="1" opacity="0.4"/>
  <!-- Particles -->
  <circle cx="80" cy="220" r="3" fill="#00e86b" opacity="0.7" filter="url(#softGlow)"/>
  <circle cx="355" cy="140" r="2.5" fill="#00e86b" opacity="0.5" filter="url(#softGlow)"/>
  <circle cx="100" cy="50" r="2" fill="#00e86b" opacity="0.4"/>
  <circle cx="350" cy="240" r="1.5" fill="#00e86b" opacity="0.3"/>
  <circle cx="120" cy="270" r="2" fill="#00e86b" opacity="0.3"/>
</svg>