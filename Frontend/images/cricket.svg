      <stop offset="0%" stop-color="#0A0E17"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  <!-- Cricket bat -->
  <rect x="160" y="60" width="28" height="140" rx="5" fill="none" stroke="#00c864" stroke-width="3" stroke-linecap="round"/>
  <rect x="160" y="80" width="28" height="80" rx="2" fill="#00c864" opacity="0.1"/>
  <line x1="168" y1="85" x2="180" y2="85" stroke="#00c864" stroke-width="1" opacity="0.4"/>
  <line x1="168" y1="95" x2="180" y2="95" stroke="#00c864" stroke-width="1" opacity="0.4"/>
  <line x1="168" y1="105" x2="180" y2="105" stroke="#00c864" stroke-width="1" opacity="0.4"/>
  <line x1="168" y1="115" x2="180" y2="115" stroke="#00c864" stroke-width="1" opacity="0.4"/>
  <line x1="168" y1="125" x2="180" y2="125" stroke="#00c864" stroke-width="1" opacity="0.4"/>
  <line x1="168" y1="135" x2="180" y2="135" stroke="#00c864" stroke-width="1" opacity="0.4"/>
  <!-- Bat handle -->
  <rect x="163" y="40" width="22" height="25" rx="4" fill="none" stroke="#00c864" stroke-width="2.5"/>
  <line x1="167" y1="44" x2="181" y2="44" stroke="#00c864" stroke-width="1.5" opacity="0.5"/>
