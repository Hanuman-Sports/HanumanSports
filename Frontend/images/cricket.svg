  <!-- Cricket ball near stumps -->
  <circle cx="320" cy="195" r="18" fill="none" stroke="#00c864" stroke-width="2.5"/>
  <path d="M310 195 Q320 185 330 195 Q320 205 310 195" fill="none" stroke="#00c864" stroke-width="1.5" opacity="0.6"/>
  <path d="M315 188 Q320 195 315 202" fill="none" stroke="#00c864" stroke-width="1" opacity="0.4"/>
  <path d="M325 188 Q320 195 325 202" fill="none" stroke="#00c864" stroke-width="1" opacity="0.4"/>
  <!-- Accent dots -->
  <circle cx="120" cy="70" r="4" fill="#00c864" opacity="0.6"/>
  <circle cx="130" cy="220" r="3" fill="#00c864" opacity="0.4"/>
  <circle cx="350" cy="50" r="2" fill="#00c864" opacity="0.3"/>
