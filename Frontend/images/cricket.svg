  <line x1="167" y1="56" x2="181" y2="56" stroke="#00c864" stroke-width="1.5" opacity="0.5"/>
  <!-- Cricket stumps -->
  <line x1="265" y1="80" x2="265" y2="210" stroke="#00c864" stroke-width="3" stroke-linecap="round"/>
  <line x1="285" y1="80" x2="285" y2="210" stroke="#00c864" stroke-width="3" stroke-linecap="round"/>
  <line x1="305" y1="80" x2="305" y2="210" stroke="#00c864" stroke-width="3" stroke-linecap="round"/>
  <!-- Bails -->
