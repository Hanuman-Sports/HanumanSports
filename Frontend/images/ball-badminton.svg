<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0E17"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  <!-- Racket head (round for ball badminton) -->
  <circle cx="165" cy="105" r="48" fill="none" stroke="#a064ff" stroke-width="3"/>
  <!-- Racket strings -->
  <line x1="130" y1="105" x2="200" y2="105" stroke="#a064ff" stroke-width="1" opacity="0.5"/>
  <line x1="135" y1="90" x2="195" y2="90" stroke="#a064ff" stroke-width="1" opacity="0.5"/>
  <line x1="135" y1="120" x2="195" y2="120" stroke="#a064ff" stroke-width="1" opacity="0.5"/>
  <line x1="140" y1="75" x2="190" y2="75" stroke="#a064ff" stroke-width="1" opacity="0.5"/>
  <line x1="140" y1="135" x2="190" y2="135" stroke="#a064ff" stroke-width="1" opacity="0.5"/>
  <line x1="148" y1="65" x2="148" y2="145" stroke="#a064ff" stroke-width="1" opacity="0.5"/>
  <line x1="165" y1="60" x2="165" y2="150" stroke="#a064ff" stroke-width="1" opacity="0.5"/>
  <line x1="182" y1="65" x2="182" y2="145" stroke="#a064ff" stroke-width="1" opacity="0.5"/>
  <!-- Racket shaft -->
  <line x1="185" y1="148" x2="205" y2="220" stroke="#a064ff" stroke-width="4" stroke-linecap="round"/>
  <!-- Racket grip -->
  <rect x="200" y="215" width="10" height="32" rx="4" fill="#a064ff" opacity="0.25"/>
  <!-- Ball -->
  <circle cx="275" cy="115" r="22" fill="none" stroke="#a064ff" stroke-width="2.5"/>
  <path d="M263 115 Q275 103 287 115 Q275 127 263 115" fill="none" stroke="#a064ff" stroke-width="1.5" opacity="0.6"/>
  <path d="M268 107 Q275 115 268 123" fill="none" stroke="#a064ff" stroke-width="1" opacity="0.4"/>
  <path d="M282 107 Q275 115 282 123" fill="none" stroke="#a064ff" stroke-width="1" opacity="0.4"/>
  <line x1="275" y1="93" x2="275" y2="137" stroke="#a064ff" stroke-width="1" opacity="0.3"/>
  <line x1="253" y1="115" x2="297" y2="115" stroke="#a064ff" stroke-width="1" opacity="0.3"/>
  <!-- Motion lines -->
  <path d="M230 80 Q240 60 260 50" fill="none" stroke="#a064ff" stroke-width="2" opacity="0.4" stroke-linecap="round"/>
  <path d="M240 90 Q250 75 260 70" fill="none" stroke="#a064ff" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
  <!-- Accent dots -->
  <circle cx="110" cy="60" r="4" fill="#a064ff" opacity="0.6"/>
  <circle cx="340" cy="200" r="3" fill="#a064ff" opacity="0.4"/>
</svg>