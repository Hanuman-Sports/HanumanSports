<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0E17"/>
      <stop offset="100%" stop-color="#141829"/>
    </linearGradient>
    <linearGradient id="purpleGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#bb77ff"/>
      <stop offset="100%" stop-color="#8844cc"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#bb77ff" stop-opacity="0.15"/>
      <stop offset="70%" stop-color="#bb77ff" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#bb77ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  <circle cx="190" cy="130" r="120" fill="url(#halo)"/>
  <!-- Racket head (round for ball badminton) -->
  <g filter="url(#glow)">
    <circle cx="155" cy="100" r="52" fill="none" stroke="url(#purpleGlow)" stroke-width="3"/>
    <circle cx="155" cy="100" r="50" fill="none" stroke="#bb77ff" stroke-width="0.5" opacity="0.3"/>
  </g>
  <!-- Racket strings horizontal -->
  <g opacity="0.5">
    <line x1="108" y1="100" x2="202" y2="100" stroke="#bb77ff" stroke-width="1.2"/>
    <line x1="110" y1="83" x2="200" y2="83" stroke="#bb77ff" stroke-width="1"/>
    <line x1="110" y1="117" x2="200" y2="117" stroke="#bb77ff" stroke-width="1"/>
    <line x1="113" y1="66" x2="197" y2="66" stroke="#bb77ff" stroke-width="0.8"/>
    <line x1="113" y1="134" x2="197" y2="134" stroke="#bb77ff" stroke-width="0.8"/>
    <line x1="118" y1="50" x2="192" y2="50" stroke="#bb77ff" stroke-width="0.6"/>
    <line x1="118" y1="150" x2="192" y2="150" stroke="#bb77ff" stroke-width="0.6"/>
  </g>
  <!-- Racket strings vertical -->
  <g opacity="0.5">
    <line x1="120" y1="55" x2="120" y2="145" stroke="#bb77ff" stroke-width="1"/>
    <line x1="135" y1="52" x2="135" y2="148" stroke="#bb77ff" stroke-width="1"/>
    <line x1="150" y1="50" x2="150" y2="150" stroke="#bb77ff" stroke-width="1"/>
    <line x1="165" y1="52" x2="165" y2="148" stroke="#bb77ff" stroke-width="1"/>
    <line x1="180" y1="55" x2="180" y2="145" stroke="#bb77ff" stroke-width="1"/>
  </g>
  <!-- Racket shaft -->
  <line x1="178" y1="148" x2="200" y2="220" stroke="url(#purpleGlow)" stroke-width="4.5" stroke-linecap="round" filter="url(#glow)"/>
  <!-- Racket grip -->
  <g opacity="0.4">
    <rect x="195" y="215" width="12" height="35" rx="5" fill="none" stroke="#bb77ff" stroke-width="2" transform="rotate(-10,201,232)"/>
    <line x1="199" y1="220" x2="208" y2="220" stroke="#bb77ff" stroke-width="1" opacity="0.3" transform="rotate(-10,201,232)"/>
    <line x1="199" y1="230" x2="208" y2="230" stroke="#bb77ff" stroke-width="1" opacity="0.3" transform="rotate(-10,201,232)"/>
    <line x1="199" y1="240" x2="208" y2="240" stroke="#bb77ff" stroke-width="1" opacity="0.3" transform="rotate(-10,201,232)"/>
  </g>
  <!-- Ball / shuttlecock -->
  <g filter="url(#glow)">
    <circle cx="275" cy="100" r="24" fill="none" stroke="url(#purpleGlow)" stroke-width="2.5"/>
    <circle cx="275" cy="100" r="22" fill="none" stroke="#bb77ff" stroke-width="0.5" opacity="0.3"/>
  </g>
  <!-- Ball pattern -->
  <g opacity="0.6">
    <path d="M261 100 Q275 88 289 100 Q275 112 261 100" fill="none" stroke="#bb77ff" stroke-width="1.5"/>
    <path d="M267 90 Q275 100 267 110" fill="none" stroke="#bb77ff" stroke-width="1"/>
    <path d="M283 90 Q275 100 283 110" fill="none" stroke="#bb77ff" stroke-width="1"/>
    <line x1="275" y1="76" x2="275" y2="124" stroke="#bb77ff" stroke-width="1" opacity="0.3"/>
    <line x1="251" y1="100" x2="299" y2="100" stroke="#bb77ff" stroke-width="1" opacity="0.3"/>
  </g>
  <!-- Shuttle feathers -->
  <g filter="url(#softGlow)" opacity="0.5">
    <path d="M260 118 Q265 145 272 118" fill="none" stroke="#bb77ff" stroke-width="1.5"/>
    <path d="M266 120 Q270 148 275 120" fill="none" stroke="#bb77ff" stroke-width="1.5"/>
    <path d="M275 121 Q280 148 284 120" fill="none" stroke="#bb77ff" stroke-width="1.5"/>
    <path d="M282 119 Q287 145 290 118" fill="none" stroke="#bb77ff" stroke-width="1.5"/>
  </g>
  <!-- Motion arcs -->
  <path d="M225 65 Q240 40 260 30" fill="none" stroke="#bb77ff" stroke-width="2" opacity="0.4" stroke-linecap="round" filter="url(#softGlow)"/>
  <path d="M235 80 Q248 60 265 52" fill="none" stroke="#bb77ff" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
  <path d="M240 50 Q255 35 275 25" fill="none" stroke="#bb77ff" stroke-width="1" opacity="0.2" stroke-linecap="round" stroke-dasharray="4,5"/>
  <!-- Particles -->
  <circle cx="90" cy="55" r="3" fill="#bb77ff" opacity="0.7" filter="url(#softGlow)"/>
  <circle cx="345" cy="180" r="2.5" fill="#bb77ff" opacity="0.5" filter="url(#softGlow)"/>
  <circle cx="80" cy="230" r="2" fill="#bb77ff" opacity="0.4"/>
  <circle cx="350" cy="70" r="1.5" fill="#bb77ff" opacity="0.3"/>
</svg>