<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0E17"/>
      <stop offset="100%" stop-color="#141829"/>
    </linearGradient>
    <linearGradient id="blueGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00c8ff"/>
      <stop offset="100%" stop-color="#0077b6"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00c8ff" stop-opacity="0.15"/>
      <stop offset="70%" stop-color="#00c8ff" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#00c8ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  <circle cx="200" cy="150" r="120" fill="url(#halo)"/>
  <!-- Soccer ball -->
  <g filter="url(#glow)">
    <circle cx="200" cy="150" r="95" fill="none" stroke="url(#blueGlow)" stroke-width="3"/>
    <circle cx="200" cy="150" r="93" fill="none" stroke="#00c8ff" stroke-width="0.5" opacity="0.3"/>
  </g>
  <!-- Soccer pentagon patches -->
  <g opacity="0.75">
    <polygon points="200,85 230,108 218,142 182,142 170,108" fill="none" stroke="#00c8ff" stroke-width="2.5" filter="url(#softGlow)"/>
    <polygon points="145,115 162,93 192,98 192,128 163,135" fill="none" stroke="#00c8ff" stroke-width="2"/>
    <polygon points="255,115 238,93 208,98 208,128 237,135" fill="none" stroke="#00c8ff" stroke-width="2"/>
    <polygon points="160,185 195,173 200,200 178,222 148,205" fill="none" stroke="#00c8ff" stroke-width="2"/>
    <polygon points="240,185 205,173 200,200 222,222 252,205" fill="none" stroke="#00c8ff" stroke-width="2"/>
  </g>
  <!-- Additional ball detail lines -->
  <g opacity="0.4">
    <path d="M200 245 Q172 232 145 215" fill="none" stroke="#00c8ff" stroke-width="2"/>
    <path d="M200 245 Q228 232 255 215" fill="none" stroke="#00c8ff" stroke-width="2"/>
    <path d="M145 215 Q130 195 125 170" fill="none" stroke="#00c8ff" stroke-width="1.5" opacity="0.3"/>
    <path d="M255 215 Q270 195 275 170" fill="none" stroke="#00c8ff" stroke-width="1.5" opacity="0.3"/>
  </g>
  <!-- Basketball -->
  <g filter="url(#softGlow)">
    <circle cx="80" cy="80" r="28" fill="none" stroke="#00c8ff" stroke-width="2" opacity="0.5"/>
    <line x1="56" y1="70" x2="104" y2="90" stroke="#00c8ff" stroke-width="1.5" opacity="0.4"/>
    <line x1="56" y1="90" x2="104" y2="70" stroke="#00c8ff" stroke-width="1.5" opacity="0.4"/>
  </g>
  <!-- Tennis ball -->
  <g filter="url(#softGlow)">
    <circle cx="320" cy="220" r="22" fill="none" stroke="#00c8ff" stroke-width="2" opacity="0.5"/>
    <path d="M304 210 Q310 220 304 230" fill="none" stroke="#00c8ff" stroke-width="1.5" opacity="0.35"/>
    <path d="M336 210 Q330 220 336 230" fill="none" stroke="#00c8ff" stroke-width="1.5" opacity="0.35"/>
  </g>
  <!-- Small decorative balls -->
  <circle cx="340" cy="70" r="10" fill="none" stroke="#00c8ff" stroke-width="1.5" opacity="0.3"/>
  <circle cx="340" cy="70" r="4" fill="#00c8ff" opacity="0.15"/>
  <circle cx="70" cy="240" r="8" fill="none" stroke="#00c8ff" stroke-width="1.5" opacity="0.25"/>
  <!-- Particles -->
  <circle cx="110" cy="260" r="3" fill="#00c8ff" opacity="0.6" filter="url(#softGlow)"/>
  <circle cx="330" cy="40" r="2.5" fill="#00c8ff" opacity="0.5"/>
  <circle cx="150" cy="50" r="2" fill="#00c8ff" opacity="0.4"/>
  <circle cx="290" cy="260" r="1.5" fill="#00c8ff" opacity="0.3"/>
</svg>