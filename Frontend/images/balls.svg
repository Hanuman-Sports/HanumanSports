<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0E17"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  <!-- Main soccer/football pattern -->
  <circle cx="200" cy="150" r="90" fill="none" stroke="#00a0ff" stroke-width="3"/>
  <!-- Pentagon patches -->
  <polygon points="200,90 225,110 215,140 185,140 175,110" fill="none" stroke="#00a0ff" stroke-width="2" opacity="0.7"/>
  <polygon points="150,120 165,100 190,105 190,130 165,135" fill="none" stroke="#00a0ff" stroke-width="2" opacity="0.5"/>
  <polygon points="250,120 235,100 210,105 210,130 235,135" fill="none" stroke="#00a0ff" stroke-width="2" opacity="0.5"/>
  <polygon points="160,175 190,165 195,190 175,210 150,195" fill="none" stroke="#00a0ff" stroke-width="2" opacity="0.5"/>
  <polygon points="240,175 210,165 205,190 225,210 250,195" fill="none" stroke="#00a0ff" stroke-width="2" opacity="0.5"/>
  <polygon points="200,210 215,195 185,195" fill="none" stroke="#00a0ff" stroke-width="2" opacity="0.6"/>
  <!-- Bottom arc lines -->
  <path d="M130 190 Q110 220 140 240" fill="none" stroke="#00a0ff" stroke-width="2" opacity="0.6"/>
  <path d="M270 190 Q290 220 260 240" fill="none" stroke="#00a0ff" stroke-width="2" opacity="0.6"/>
  <path d="M160 235 Q200 255 240 235" fill="none" stroke="#00a0ff" stroke-width="2" opacity="0.6"/>
  <!-- Small accent balls -->
  <circle cx="80" cy="70" r="18" fill="none" stroke="#00a0ff" stroke-width="2" opacity="0.4"/>
  <circle cx="80" cy="70" r="6" fill="#00a0ff" opacity="0.2"/>
  <circle cx="320" cy="220" r="14" fill="none" stroke="#00a0ff" stroke-width="2" opacity="0.3"/>
  <circle cx="320" cy="220" r="5" fill="#00a0ff" opacity="0.15"/>
  <!-- Accent dots -->
  <circle cx="90" cy="250" r="3" fill="#00a0ff" opacity="0.5"/>
  <circle cx="330" cy="60" r="2" fill="#00a0ff" opacity="0.3"/>
</svg>