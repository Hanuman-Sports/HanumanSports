<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0E17"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  <!-- Racket head -->
  <ellipse cx="185" cy="95" rx="45" ry="55" fill="none" stroke="#00F0FF" stroke-width="3" transform="rotate(-25,185,95)"/>
  <!-- Racket strings horizontal -->
  <line x1="148" y1="95" x2="222" y2="95" stroke="#00F0FF" stroke-width="1" opacity="0.6" transform="rotate(-25,185,95)"/>
  <line x1="152" y1="80" x2="218" y2="80" stroke="#00F0FF" stroke-width="1" opacity="0.6" transform="rotate(-25,185,95)"/>
  <line x1="152" y1="110" x2="218" y2="110" stroke="#00F0FF" stroke-width="1" opacity="0.6" transform="rotate(-25,185,95)"/>
  <line x1="158" y1="65" x2="212" y2="65" stroke="#00F0FF" stroke-width="1" opacity="0.6" transform="rotate(-25,185,95)"/>
  <line x1="158" y1="125" x2="212" y2="125" stroke="#00F0FF" stroke-width="1" opacity="0.6" transform="rotate(-25,185,95)"/>
  <!-- Racket strings vertical -->
  <line x1="165" y1="60" x2="165" y2="130" stroke="#00F0FF" stroke-width="1" opacity="0.6" transform="rotate(-25,185,95)"/>
  <line x1="180" y1="55" x2="180" y2="135" stroke="#00F0FF" stroke-width="1" opacity="0.6" transform="rotate(-25,185,95)"/>
  <line x1="195" y1="55" x2="195" y2="135" stroke="#00F0FF" stroke-width="1" opacity="0.6" transform="rotate(-25,185,95)"/>
  <line x1="210" y1="60" x2="210" y2="130" stroke="#00F0FF" stroke-width="1" opacity="0.6" transform="rotate(-25,185,95)"/>
  <!-- Racket shaft -->
  <line x1="198" y1="140" x2="218" y2="210" stroke="#00F0FF" stroke-width="4" stroke-linecap="round"/>
  <!-- Racket grip -->
  <rect x="214" y="210" width="8" height="30" rx="3" fill="#00F0FF" opacity="0.3" transform="rotate(-15,218,225)"/>
  <!-- Shuttlecock -->
  <ellipse cx="280" cy="110" rx="25" ry="18" fill="none" stroke="#00F0FF" stroke-width="2" transform="rotate(15,280,110)"/>
  <line x1="260" y1="105" x2="300" y2="105" stroke="#00F0FF" stroke-width="1" opacity="0.5" transform="rotate(15,280,110)"/>
  <line x1="258" y1="115" x2="302" y2="115" stroke="#00F0FF" stroke-width="1" opacity="0.5" transform="rotate(15,280,110)"/>
  <line x1="265" y1="95" x2="295" y2="95" stroke="#00F0FF" stroke-width="1" opacity="0.5" transform="rotate(15,280,110)"/>
  <!-- Shuttlecock skirt -->
  <path d="M270 122 Q280 160 290 122" fill="none" stroke="#00F0FF" stroke-width="2"/>
  <line x1="275" y1="125" x2="275" y2="155" stroke="#00F0FF" stroke-width="1" opacity="0.4"/>
  <line x1="280" y1="128" x2="280" y2="160" stroke="#00F0FF" stroke-width="1" opacity="0.4"/>
  <line x1="285" y1="125" x2="285" y2="155" stroke="#00F0FF" stroke-width="1" opacity="0.4"/>
  <!-- Accent dots -->
  <circle cx="120" cy="80" r="4" fill="#00F0FF" opacity="0.6"/>
  <circle cx="320" cy="200" r="3" fill="#00F0FF" opacity="0.4"/>
  <circle cx="100" cy="200" r="2" fill="#00F0FF" opacity="0.3"/>
</svg>