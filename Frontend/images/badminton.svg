<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0E17"/>
      <stop offset="100%" stop-color="#141829"/>
    </linearGradient>
    <linearGradient id="cyanGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F0FF"/>
      <stop offset="100%" stop-color="#0099CC"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00F0FF" stop-opacity="0.15"/>
      <stop offset="70%" stop-color="#00F0FF" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#00F0FF" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  <circle cx="190" cy="130" r="120" fill="url(#halo)"/>
  <!-- Racket head -->
  <g filter="url(#glow)">
    <ellipse cx="165" cy="95" rx="45" ry="58" fill="none" stroke="url(#cyanGlow)" stroke-width="3" transform="rotate(-20,165,95)"/>
    <ellipse cx="165" cy="95" rx="43" ry="56" fill="none" stroke="#00F0FF" stroke-width="0.5" opacity="0.3" transform="rotate(-20,165,95)"/>
  </g>
  <!-- Racket strings horizontal -->
  <g opacity="0.5">
    <line x1="128" y1="95" x2="202" y2="95" stroke="#00F0FF" stroke-width="1" transform="rotate(-20,165,95)"/>
    <line x1="129" y1="78" x2="201" y2="78" stroke="#00F0FF" stroke-width="1" transform="rotate(-20,165,95)"/>
    <line x1="129" y1="112" x2="201" y2="112" stroke="#00F0FF" stroke-width="1" transform="rotate(-20,165,95)"/>
    <line x1="132" y1="61" x2="198" y2="61" stroke="#00F0FF" stroke-width="0.8" transform="rotate(-20,165,95)"/>
    <line x1="132" y1="129" x2="198" y2="129" stroke="#00F0FF" stroke-width="0.8" transform="rotate(-20,165,95)"/>
    <line x1="137" y1="45" x2="193" y2="45" stroke="#00F0FF" stroke-width="0.6" transform="rotate(-20,165,95)"/>
    <line x1="137" y1="145" x2="193" y2="145" stroke="#00F0FF" stroke-width="0.6" transform="rotate(-20,165,95)"/>
  </g>
  <!-- Racket strings vertical -->
  <g opacity="0.5">
    <line x1="145" y1="52" x2="145" y2="138" stroke="#00F0FF" stroke-width="1" transform="rotate(-20,165,95)"/>
    <line x1="155" y1="48" x2="155" y2="142" stroke="#00F0FF" stroke-width="1" transform="rotate(-20,165,95)"/>
    <line x1="165" y1="45" x2="165" y2="145" stroke="#00F0FF" stroke-width="1" transform="rotate(-20,165,95)"/>
    <line x1="175" y1="48" x2="175" y2="142" stroke="#00F0FF" stroke-width="1" transform="rotate(-20,165,95)"/>
    <line x1="185" y1="52" x2="185" y2="138" stroke="#00F0FF" stroke-width="1" transform="rotate(-20,165,95)"/>
  </g>
  <!-- Racket shaft -->
  <line x1="177" y1="142" x2="200" y2="215" stroke="url(#cyanGlow)" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Racket grip -->
  <rect x="194" y="210" width="12" height="35" rx="4" fill="none" stroke="#00F0FF" stroke-width="2" opacity="0.4" transform="rotate(-15,200,227)"/>
  <line x1="198" y1="215" x2="207" y2="215" stroke="#00F0FF" stroke-width="1" opacity="0.3" transform="rotate(-15,200,227)"/>
  <line x1="198" y1="225" x2="207" y2="225" stroke="#00F0FF" stroke-width="1" opacity="0.3" transform="rotate(-15,200,227)"/>
  <line x1="198" y1="235" x2="207" y2="235" stroke="#00F0FF" stroke-width="1" opacity="0.3" transform="rotate(-15,200,227)"/>
  <!-- Shuttlecock -->
  <g filter="url(#glow)">
    <circle cx="275" cy="95" r="22" fill="none" stroke="#00F0FF" stroke-width="2" opacity="0.8"/>
    <path d="M258 83 Q262 80 268 82" fill="none" stroke="#00F0FF" stroke-width="1.5" opacity="0.6"/>
    <path d="M282 83 Q278 80 272 82" fill="none" stroke="#00F0FF" stroke-width="1.5" opacity="0.6"/>
    <path d="M260 100 Q275 85 290 100" fill="none" stroke="#00F0FF" stroke-width="1" opacity="0.3"/>
  </g>
  <!-- Shuttlecock skirt (feathers) -->
  <g filter="url(#softGlow)">
    <path d="M260 110 Q275 155 290 110" fill="none" stroke="#00F0FF" stroke-width="2" opacity="0.7"/>
    <line x1="263" y1="112" x2="275" y2="150" stroke="#00F0FF" stroke-width="1" opacity="0.5"/>
    <line x1="268" y1="114" x2="275" y2="152" stroke="#00F0FF" stroke-width="1" opacity="0.5"/>
    <line x1="275" y1="115" x2="275" y2="155" stroke="#00F0FF" stroke-width="1" opacity="0.5"/>
    <line x1="282" y1="114" x2="275" y2="152" stroke="#00F0FF" stroke-width="1" opacity="0.5"/>
    <line x1="287" y1="112" x2="275" y2="150" stroke="#00F0FF" stroke-width="1" opacity="0.5"/>
  </g>
  <!-- Motion lines behind shuttle -->
  <path d="M310 60 Q320 45 335 35" fill="none" stroke="#00F0FF" stroke-width="1.5" opacity="0.4" stroke-linecap="round" stroke-dasharray="4,6"/>
  <path d="M315 75 Q325 60 340 55" fill="none" stroke="#00F0FF" stroke-width="1" opacity="0.3" stroke-linecap="round" stroke-dasharray="3,5"/>
  <!-- Particles / sparks -->
  <circle cx="90" cy="60" r="3" fill="#00F0FF" opacity="0.8" filter="url(#softGlow)"/>
  <circle cx="340" cy="200" r="2.5" fill="#00F0FF" opacity="0.6" filter="url(#softGlow)"/>
  <circle cx="80" cy="220" r="2" fill="#00F0FF" opacity="0.4"/>
  <circle cx="350" cy="80" r="1.5" fill="#00F0FF" opacity="0.5"/>
  <circle cx="120" cy="50" r="1.5" fill="#00F0FF" opacity="0.3"/>
  <circle cx="310" cy="230" r="1" fill="#00F0FF" opacity="0.4"/>
</svg>