<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Hanuman Sports</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00F0FF;
            --secondary: #0A0E17;
            --accent: #00F0FF;
            --light: #F8F9FA;
            --white: #FFFFFF;
            --gray: #6C757D;
            --glass: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --neon-shadow: 0 0 12px rgba(0, 240, 255, 0.8);
            --primary-shadow: 0 0 18px rgba(0,240,255,0.6);
            --success: #4CAF50;
            --danger: #dc3545;
            --warning: #ffc107;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--secondary);
            color: var(--light);
            min-height: 100vh;
            position: relative;
        }

        .floating-elements {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .floating-element {
            position: absolute;
            border-radius: 50%;
            background: rgba(0, 240, 255, 0.03);
            filter: blur(40px);
            animation: float 20s infinite linear;
        }

        @keyframes float {
            0% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(30vw, 30vh) rotate(180deg); }
            100% { transform: translate(0, 0) rotate(360deg); }
        }

        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--secondary);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 10px;
        }

        /* Header */
        .admin-header {
            background: rgba(10, 14, 23, 0.95);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--glass-border);
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo img {
            height: 50px;
            filter: drop-shadow(0 0 5px var(--primary));
        }

        .logo h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            background: linear-gradient(to right, #ffffff, #00F0FF);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-buttons {
            display: flex;
            gap: 15px;
        }

        .header-btn {
            background: rgba(0, 240, 255, 0.1);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            padding: 0.5rem 1rem;
            color: var(--light);
            text-decoration: none;
            transition: 0.3s;
        }

        .header-btn:hover {
            background: var(--primary);
            color: #000;
        }

        /* Main Container */
        .admin-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
            position: relative;
            z-index: 1;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            padding: 1.5rem;
            text-align: center;
            transition: 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
        }

        .stat-card i {
            font-size: 2rem;
            color: var(--primary);
            margin-bottom: 0.5rem;
        }

        .stat-card .value {
            font-size: 2rem;
            font-weight: 700;
            font-family: 'Orbitron', sans-serif;
            color: var(--primary);
        }

        .stat-card .label {
            color: var(--gray);
            font-size: 0.85rem;
        }

        /* Form Section */
        .form-section {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            padding: 2rem;
            margin-bottom: 2rem;
        }

        .form-section h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.3rem;
            color: var(--primary);
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--light);
            font-weight: 500;
        }

        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 0.8rem 1rem;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            color: var(--light);
            transition: 0.3s;
        }

        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.3);
        }

        .btn {
            background: var(--primary);
            color: #000;
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            font-family: 'Orbitron', sans-serif;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.5);
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-danger:hover {
            box-shadow: 0 0 20px rgba(220, 53, 69, 0.5);
        }

        /* Products Table */
        .products-section {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            padding: 2rem;
        }

        .products-section h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.3rem;
            color: var(--primary);
            margin-bottom: 1.5rem;
        }

        .table-wrapper {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid var(--glass-border);
        }

        th {
            color: var(--primary);
            font-weight: 600;
        }

        tr:hover td {
            background: rgba(0, 240, 255, 0.05);
        }

        .action-btn {
            background: transparent;
            border: 1px solid var(--glass-border);
            border-radius: 6px;
            padding: 0.4rem 0.8rem;
            color: var(--light);
            cursor: pointer;
            margin: 0 3px;
            transition: 0.3s;
        }

        .action-btn:hover {
            background: var(--primary);
            color: #000;
        }

        .delete-btn:hover {
            background: var(--danger);
            color: white;
        }

        .search-box {
            margin-bottom: 1.5rem;
            display: flex;
            gap: 1rem;
        }

        .search-box input {
            flex: 1;
            padding: 0.8rem 1rem;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            color: var(--light);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--secondary);
            border: 1px solid var(--primary);
            border-radius: 15px;
            padding: 2rem;
            max-width: 500px;
            width: 90%;
        }

        .modal-content h3 {
            color: var(--primary);
            margin-bottom: 1rem;
        }

        /* Notification */
        .notification {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--primary);
            color: #000;
            padding: 12px 20px;
            border-radius: 8px;
            transform: translateX(200%);
            transition: 0.3s;
            z-index: 1000;
        }

        .notification.show {
            transform: translateX(0);
        }

        @media (max-width: 768px) {
            .admin-container {
                padding: 1rem;
            }
            .form-grid {
                grid-template-columns: 1fr;
            }
            th, td {
                padding: 0.5rem;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="floating-elements">
        <div class="floating-element" style="width: 300px; height: 300px; top: 10%; left: 5%;"></div>
        <div class="floating-element" style="width: 400px; height: 400px; bottom: 15%; right: 10%; animation-delay: 3s;"></div>
        <div class="floating-element" style="width: 250px; height: 250px; top: 50%; left: 30%; animation-delay: 5s;"></div>
    </div>

    <div class="admin-header">
        <div class="logo">
            <img src="logo.png" alt="Hanuman Sports">
            <h1>ADMIN PANEL</h1>
        </div>
        <div class="header-buttons">
            <a href="index.html" class="header-btn"><i class="fas fa-home"></i> Home</a>
            <a href="#" id="logout-admin" class="header-btn"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </div>
    </div>

    <div class="admin-container">
        <!-- Stats Cards -->
        <div class="stats-grid">
            <div class="stat-card">
                <i class="fas fa-box"></i>
                <div class="value" id="total-products">0</div>
                <div class="label">Total Products</div>
            </div>
            <div class="stat-card">
                <i class="fas fa-tags"></i>
                <div class="value" id="total-categories">0</div>
                <div class="label">Categories</div>
            </div>
            <div class="stat-card">
                <i class="fas fa-cubes"></i>
                <div class="value" id="total-stock">0</div>
                <div class="label">Total Stock</div>
            </div>
        </div>

        <!-- Add Product Form -->
        <div class="form-section">
            <h2><i class="fas fa-plus-circle"></i> Add New Product</h2>
            <form id="product-form">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Product Name *</label>
                        <input type="text" id="prod-name" required>
                    </div>
                    <div class="form-group">
                        <label>Category *</label>
                        <select id="prod-category" required>
                            <option value="">Select Category</option>
                            <option value="Badminton">Badminton</option>
                            <option value="Cricket">Cricket</option>
                            <option value="Balls">Balls</option>
                            <option value="Accessories">Accessories</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Sub Category</label>
                        <input type="text" id="prod-subcategory" placeholder="e.g., racket, balls, protection">
                    </div>
                    <div class="form-group">
                        <label>Price (Selling) *</label>
                        <input type="number" id="prod-price" required>
                    </div>
                    <div class="form-group">
                        <label>MRP (Original Price)</label>
                        <input type="number" id="prod-mrp">
                    </div>
                    <div class="form-group">
                        <label>Stock Quantity *</label>
                        <input type="number" id="prod-stock" required>
                    </div>
                    <div class="form-group">
                        <label>SKU Code *</label>
                        <input type="text" id="prod-sku" placeholder="HS-CAT-XXX" required>
                    </div>
                    <div class="form-group">
                        <label>Rating (0-5)</label>
                        <input type="number" id="prod-rating" step="0.1" min="0" max="5" value="0">
                    </div>
                    <div class="form-group">
                        <label>Badge (Optional)</label>
                        <select id="prod-badge">
                            <option value="">None</option>
                            <option value="Best Seller">Best Seller</option>
                            <option value="New">New</option>
                            <option value="Sale">Sale</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Main Image URL</label>
                        <input type="url" id="prod-image" placeholder="https://...">
                    </div>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="prod-description" rows="3" placeholder="Product description..."></textarea>
                </div>
                <button type="submit" class="btn"><i class="fas fa-save"></i> Add Product</button>
            </form>
        </div>

        <!-- Products List -->
        <div class="products-section">
            <h2><i class="fas fa-list"></i> All Products</h2>
            <div class="search-box">
                <input type="text" id="search-input" placeholder="Search by name, category, or SKU...">
                <select id="category-filter">
                    <option value="">All Categories</option>
                    <option value="Badminton">Badminton</option>
                    <option value="Cricket">Cricket</option>
                    <option value="Balls">Balls</option>
                    <option value="Accessories">Accessories</option>
                </select>
                <button class="btn" id="search-btn"><i class="fas fa-search"></i> Search</button>
                <button class="btn" id="refresh-btn"><i class="fas fa-refresh"></i> Refresh</button>
            </div>
            <div class="table-wrapper">
                <table id="products-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>SKU</th>
                            <th>Name</th>
                            <th>Category</th>
                            <th>Price</th>
                            <th>Stock</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="products-tbody">
                        <tr><td colspan="7" style="text-align: center;">Loading products...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div id="edit-modal" class="modal">
        <div class="modal-content">
            <h3><i class="fas fa-edit"></i> Edit Product</h3>
            <form id="edit-form">
                <input type="hidden" id="edit-id">
                <div class="form-group">
                    <label>Product Name</label>
                    <input type="text" id="edit-name" required>
                </div>
                <div class="form-group">
                    <label>Price (₹)</label>
                    <input type="number" id="edit-price" required>
                </div>
                <div class="form-group">
                    <label>Stock</label>
                    <input type="number" id="edit-stock" required>
                </div>
                <div class="form-group">
                    <label>MRP</label>
                    <input type="number" id="edit-mrp">
                </div>
                <div class="form-group">
                    <label>Discount %</label>
                    <input type="number" id="edit-discount" readonly style="background: #333;">
                </div>
                <div style="display: flex; gap: 1rem; margin-top: 1rem;">
                    <button type="submit" class="btn">Save Changes</button>
                    <button type="button" class="btn btn-danger" id="close-modal">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <div class="notification" id="notification">Success!</div>

    <script>
        const API_URL = window.location.origin.includes('localhost') ? 'http://localhost:3000/api' : '/api';
        let allProducts = [];

        // ✅ Admin Auth Protection - redirect if not admin
        (function checkAdminAuth() {
            const token = localStorage.getItem('token');
            const role = localStorage.getItem('role');
            if (!token || role !== 'admin') {
                if(window.HSToast)HSToast.error('Access denied! Admins only.'); else toastError('Notice', 'Access denied! Admins only.');
                window.location.href = 'login.html';
            }
        })();

        // ✅ Add token to all admin API calls
        function authHeaders() {
            return {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + localStorage.getItem('token')
            };
        }

        // Show notification
        function showNotification(message, isError = false) {
            const notif = document.getElementById('notification');
            notif.textContent = message;
            notif.style.background = isError ? '#dc3545' : '#00F0FF';
            notif.style.color = isError ? 'white' : 'black';
            notif.classList.add('show');
            setTimeout(() => notif.classList.remove('show'), 3000);
        }

        // Load dashboard stats
        async function loadStats() {
            try {
                const response = await fetch(`${API_URL}/stats`);
                const data = await response.json();
                if (data.success) {
                    document.getElementById('total-products').textContent = data.stats.products || 0;
                    document.getElementById('total-categories').textContent = data.stats.categories || 0;
                    document.getElementById('total-stock').textContent = data.stats.stock || 0;
                }
            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }

        // Load products
        async function loadProducts() {
            try {
                const response = await fetch(`${API_URL}/products`);
                const data = await response.json();
                if (data.success) {
                    allProducts = data.products;
                    displayProducts(allProducts);
                    loadStats();
                } else {
                    showNotification('Failed to load products', true);
                }
            } catch (error) {
                console.error('Error loading products:', error);
                showNotification('Cannot connect to server. Make sure backend is running.', true);
                document.getElementById('products-tbody').innerHTML = '<tr><td colspan="7" style="text-align: center;">❌ Cannot connect to server. Run "node server.js"</td></tr>';
            }
        }

        // Display products in table
        function displayProducts(products) {
            const tbody = document.getElementById('products-tbody');
            if (!products || products.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align: center;">No products found</td></tr>';
                return;
            }
            tbody.innerHTML = '';
            products.forEach(product => {
                const row = tbody.insertRow();
                row.insertCell(0).textContent = product.id;
                row.insertCell(1).textContent = product.sku || '-';
                row.insertCell(2).textContent = product.name.length > 50 ? product.name.substring(0, 50) + '...' : product.name;
                row.insertCell(3).textContent = product.category;
                row.insertCell(4).innerHTML = `₹${product.price}`;
                row.insertCell(5).innerHTML = `<span style="color: ${product.stock < 10 ? '#ff6b6b' : '#4CAF50'}">${product.stock}</span>`;
                const actions = row.insertCell(6);
                actions.innerHTML = `
                    <button class="action-btn edit-btn" data-id="${product.id}"><i class="fas fa-edit"></i></button>
                    <button class="action-btn delete-btn" data-id="${product.id}" data-name="${product.name.replace(/'/g, "\\'")}"><i class="fas fa-trash"></i></button>
                `;
            });
            // Add event listeners to edit/delete buttons
            document.querySelectorAll('.edit-btn').forEach(btn => {
                btn.addEventListener('click', () => openEditModal(btn.dataset.id));
            });
            document.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', () => deleteProduct(btn.dataset.id, btn.dataset.name));
            });
        }

        // Add product
        document.getElementById('product-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('prod-name').value;
            const category = document.getElementById('prod-category').value;
            const sub_category = document.getElementById('prod-subcategory').value;
            const price = parseFloat(document.getElementById('prod-price').value);
            const original_price = parseFloat(document.getElementById('prod-mrp').value) || 0;
            const stock = parseInt(document.getElementById('prod-stock').value);
            const sku = document.getElementById('prod-sku').value;
            const rating = parseFloat(document.getElementById('prod-rating').value) || 0;
            const badge = document.getElementById('prod-badge').value || null;
            const main_image = document.getElementById('prod-image').value || null;
            const description = document.getElementById('prod-description').value || '';
            
            let discount_percent = 0;
            if (original_price > 0 && price < original_price) {
                discount_percent = Math.round(((original_price - price) / original_price) * 100);
            }
            
            const productData = { name, category, sub_category, price, original_price, discount_percent, stock, sku, rating, reviews_count: 0, description, main_image, badge };
            
            try {
                const response = await fetch(`${API_URL}/admin/products`, {
                    method: 'POST',
                    headers: authHeaders(),
                    body: JSON.stringify(productData)
                });
                const data = await response.json();
                if (data.success) {
                    showNotification(`✓ ${name} added successfully!`);
                    document.getElementById('product-form').reset();
                    loadProducts();
                } else {
                    showNotification(`✗ ${data.message}`, true);
                }
            } catch (error) {
                showNotification('Error adding product', true);
            }
        });

        // Open edit modal
        async function openEditModal(id) {
            const product = allProducts.find(p => p.id == id);
            if (!product) return;
            document.getElementById('edit-id').value = product.id;
            document.getElementById('edit-name').value = product.name;
            document.getElementById('edit-price').value = product.price;
            document.getElementById('edit-stock').value = product.stock;
            document.getElementById('edit-mrp').value = product.original_price || '';
            const discount = product.discount_percent || (product.original_price ? Math.round(((product.original_price - product.price) / product.original_price) * 100) : 0);
            document.getElementById('edit-discount').value = discount;
            document.getElementById('edit-modal').classList.add('active');
        }

        // Update product
        document.getElementById('edit-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('edit-id').value;
            const name = document.getElementById('edit-name').value;
            const price = parseFloat(document.getElementById('edit-price').value);
            const stock = parseInt(document.getElementById('edit-stock').value);
            const original_price = parseFloat(document.getElementById('edit-mrp').value) || 0;
            let discount_percent = 0;
            if (original_price > 0 && price < original_price) {
                discount_percent = Math.round(((original_price - price) / original_price) * 100);
            }
            
            try {
                const response = await fetch(`${API_URL}/admin/products/${id}`, {
                    method: 'PUT',
                    headers: authHeaders(),
                    body: JSON.stringify({ name, price, stock, original_price, discount_percent })
                });
                const data = await response.json();
                if (data.success) {
                    showNotification('Product updated successfully!');
                    document.getElementById('edit-modal').classList.remove('active');
                    loadProducts();
                } else {
                    showNotification(data.message, true);
                }
            } catch (error) {
                showNotification('Error updating product', true);
            }
        });

        // Delete product
        async function deleteProduct(id, name) {
            if (confirm(`Are you sure you want to delete "${name}"?`)) {
                try {
                    const response = await fetch(`${API_URL}/admin/products/${id}`, { method: 'DELETE' });
                    const data = await response.json();
                    if (data.success) {
                        showNotification(`✓ ${name} deleted!`);
                        loadProducts();
                    } else {
                        showNotification(data.message, true);
                    }
                } catch (error) {
                    showNotification('Error deleting product', true);
                }
            }
        }

        // Search and filter
        document.getElementById('search-btn').addEventListener('click', () => {
            const searchTerm = document.getElementById('search-input').value.toLowerCase();
            const categoryFilter = document.getElementById('category-filter').value;
            let filtered = allProducts;
            if (searchTerm) {
                filtered = filtered.filter(p => p.name.toLowerCase().includes(searchTerm) || p.sku?.toLowerCase().includes(searchTerm));
            }
            if (categoryFilter) {
                filtered = filtered.filter(p => p.category === categoryFilter);
            }
            displayProducts(filtered);
        });

        document.getElementById('refresh-btn').addEventListener('click', () => {
            document.getElementById('search-input').value = '';
            document.getElementById('category-filter').value = '';
            loadProducts();
        });

        document.getElementById('close-modal').addEventListener('click', () => {
            document.getElementById('edit-modal').classList.remove('active');
        });

        document.getElementById('edit-modal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('edit-modal')) {
                document.getElementById('edit-modal').classList.remove('active');
            }
        });

        document.getElementById('logout-admin').addEventListener('click', (e) => {
            e.preventDefault();
            localStorage.clear();
            window.location.href = 'login.html';
        });

        // Calculate discount when MRP or Price changes
        document.getElementById('prod-mrp').addEventListener('input', updateDiscount);
        document.getElementById('prod-price').addEventListener('input', updateDiscount);
        function updateDiscount() {
            const mrp = parseFloat(document.getElementById('prod-mrp').value) || 0;
            const price = parseFloat(document.getElementById('prod-price').value) || 0;
            if (mrp > 0 && price > 0 && price < mrp) {
                const discount = Math.round(((mrp - price) / mrp) * 100);
                document.getElementById('prod-discount').value = discount;
            }
        }

        // Initialize
        loadProducts();
    </script>
<script src="hs-utils.js"></script>
</body>
</html>
