name: CI — Test Backend

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm install
        working-directory: Backend

      - name: Create .env for CI
        run: |
          cat > Backend/.env << 'EOF'
          JWT_SECRET=ci_test_secret_for_github_actions
          PORT=3000
          RAZORPAY_KEY_ID=
          RAZORPAY_KEY_SECRET=
          EOF

      - name: Start server
        run: node server.js &
        working-directory: Backend
        env:
          JWT_SECRET: ci_test_secret_for_github_actions
          PORT: 3000

      - name: Wait for server
        run: sleep 4

      - name: Test — Products API
        run: |
          RESPONSE=$(curl -s http://localhost:3000/api/products)
          echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); assert len(d.get('products',[])) > 0, 'No products'; print('✅ Products: ' + str(len(d['products'])))"

      - name: Test — Registration
        run: |
          RESPONSE=$(curl -s -X POST http://localhost:3000/api/auth/register \
            -H "Content-Type: application/json" \
            -d '{"firstname":"CI","email":"ci@test.com","password":"test123"}')
          echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); assert 'registered' in d.get('message','').lower() or 'already' in d.get('message','').lower(), 'Register failed: ' + str(d); print('✅ Registration OK')"

      - name: Test — Login
        run: |
          RESPONSE=$(curl -s -X POST http://localhost:3000/api/auth/login \
            -H "Content-Type: application/json" \
            -d '{"email":"ci@test.com","password":"test123"}')
          echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); assert d.get('token'), 'Login failed: ' + str(d); print('✅ Login OK')"

      - name: Test — Password validation
        run: |
          RESPONSE=$(curl -s -X POST http://localhost:3000/api/auth/register \
            -H "Content-Type: application/json" \
            -d '{"firstname":"Bad","email":"bad@test.com","password":"12"}')
          echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); assert '6 characters' in d.get('message',''), 'Password validation failed: ' + str(d); print('✅ Password validation OK')"

      - name: Test — CORS blocks unknown origins
        run: |
          RESPONSE=$(curl -s -H "Origin: https://evil.com" http://localhost:3000/api/products)
          echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); assert 'not allowed' in d.get('message','').lower(), 'CORS not blocking: ' + str(d); print('✅ CORS blocking OK')"

      - name: Test — Order price server-side
        run: |
          TOKEN=$(curl -s -X POST http://localhost:3000/api/auth/login \
            -H "Content-Type: application/json" \
            -d '{"email":"ci@test.com","password":"test123"}' | python3 -c "import sys,json; print(json.load(sys.stdin).get('token',''))")
          RESPONSE=$(curl -s -X POST http://localhost:3000/api/orders/create \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $TOKEN" \
            -d '{"items":[{"id":1,"quantity":2}],"total":1,"payment_method":"cod"}')
          echo "$RESPONSE" | python3 -c "
          import sys,json
          d = json.load(sys.stdin)
          o = d.get('order', {})
          total = float(o.get('totalAmount', 0))
          assert total > 1, f'Price manipulation not blocked: total={total}'
          print(f'✅ Order price OK: ₹{total} (not ₹1)')
          "

      - name: Stop server
        if: always()
        run: kill $(lsof -t -i:3000) 2>/dev/null || true
